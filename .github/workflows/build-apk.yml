name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev \
            build-essential ccache libgdbm-dev libc6-dev libsqlite3-dev \
            libbz2-dev texinfo libasound2-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Install Buildozer and Toolchain Requirements
        run: |
          python -m pip install --upgrade pip
          # Upgrading to cython 3.x is necessary for modern Kivy packaging on Python 3.10+
          pip install wheel setuptools cython==3.0.11 buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          # "v2" forces GitHub to clear the old, broken build cache and start clean
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('Frontend/buildozer.spec') }}

      - name: Build APK (debug)
        working-directory: Frontend
        run: |
          # Crucial: Unset GitHub's pre-installed NDK paths so Buildozer can use its own r25c
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          
          # Automatically accept SDK licenses
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # Run the build
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: atmoscare-debug-apk
          # Matching the exact multi-architecture directory buildozer generates inside Frontend
          path: Frontend/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/build/outputs/apk/debug/*.apk
