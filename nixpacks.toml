# Railway / Nixpacks — pull Git LFS model artifacts during build
[phases.setup]
nixPkgs = ["git", "git-lfs"]

[phases.install]
cmds = [
  "git lfs install",
  "git lfs pull",
  "pip install -r requirements-backend.txt",
]

[start]
cmd = "uvicorn Backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
